    <style>

            min-height: 100vh;
            overflow-x: hidden;

        /* Math Text Fix */

            direction: ltr !important;
            unicode-bidi: bidi-override !important;
            display: inline-block;
            font-variant-numeric: tabular-nums;
            font-family: monospace, sans-serif;

        /* Puzzle Styling */
        .puzzle-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border: 6px solid #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);

        }

            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

            width: 100%; height: 100%;
            align-items: center; justify-content: center;

            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);

        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }

    </style>

    <script>
        // --- Robust Themes ---
        const themes = [
            { url: "https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=600&q=80", emoji: "🦁", color: "bg-orange-100" },
            { url: "https://images.unsplash.com/photo-1535378437323-9555f3e7f5bb?w=600&q=80", emoji: "🤖", color: "bg-blue-100" },
            { url: "https://images.unsplash.com/photo-1548266652-99cf277df528?w=600&q=80", emoji: "🦊", color: "bg-red-100" },
            { url: "https://images.unsplash.com/photo-1596496356999-52d3a339903e?w=600&q=80", emoji: "🚀", color: "bg-indigo-100" },
            { url: "https://images.unsplash.com/photo-1599692482390-3330628e8331?w=600&q=80", emoji: "🏰", color: "bg-pink-100" },
            { url: "https://images.unsplash.com/photo-1565985864115-3f9c6d4825d1?w=600&q=80", emoji: "🦸", color: "bg-yellow-100" },
            { url: "https://images.unsplash.com/photo-1555169062-013468b47731?w=600&q=80", emoji: "🦜", color: "bg-green-100" }
        ];

        // --- State ---
        let selectedTables = [2, 5, 10]; 
        let difficulty = 'normal'; 
        let tilesRemaining = [];
        let currentQ = null;
        let isProcessing = false;
        let currentTheme = null;
        const apiKey = ""; 

        // --- Elements ---
        const screens = { setup: document.getElementById('setup-screen'), game: document.getElementById('game-screen'), victory: document.getElementById('victory-screen') };
        const gameImg = document.getElementById('game-img');
        const gameFallback = document.getElementById('game-fallback');
        const gameEmoji = document.getElementById('game-emoji');
        const victoryImg = document.getElementById('victory-img');
        const vicFallback = document.getElementById('vic-fallback');
        const vicEmoji = document.getElementById('vic-emoji');
        const puzzleGrid = document.getElementById('puzzle-grid');
        const questionDisplay = document.getElementById('question-display');
        const optionsContainer = document.getElementById('options-container');
        const feedbackArea = document.getElementById('feedback-area');
        const globalHomeBtn = document.getElementById('global-home-btn');
        const diffDesc = document.getElementById('diff-desc');

        // --- Setup ---
        function toggleNumber(num) {
            const btn = document.getElementById(`btn-${num}`);
            if (selectedTables.includes(num)) {
                if (selectedTables.length > 1) {
                    selectedTables = selectedTables.filter(n => n !== num);
                    btn.classList.remove('selected');
                }
            } else {
                selectedTables.push(num);
                btn.classList.add('selected');
            }
        }

        function setDifficulty(level) {
            difficulty = level;
            document.getElementById('diff-normal').className = `difficulty-btn w-1/2 ${level === 'normal' ? 'active' : ''}`;
            document.getElementById('diff-hard').className = `difficulty-btn w-1/2 ${level === 'hard' ? 'active' : ''}`;
            
            if (level === 'hard') {
                diffDesc.innerText = "נעלמים, בלי כפל ב-1 ו-10!";
                diffDesc.className = "text-xs text-red-500 mt-2 font-medium h-4";
            } else {
                diffDesc.innerText = "תרגילים רגילים עד 10";
                diffDesc.className = "text-xs text-orange-500 mt-2 font-medium h-4";
            }
        }

        function goHome() {
            screens.victory.classList.add('hidden');
            screens.game.classList.add('hidden');
            screens.setup.classList.remove('hidden');
            globalHomeBtn.classList.add('hidden');
        }

        function useFallback() {
            gameImg.style.display = 'none';
            gameFallback.style.display = 'flex';
            gameFallback.className = `puzzle-content fallback-content flex ${currentTheme.color}`;
            gameEmoji.innerText = currentTheme.emoji;
            
            victoryImg.style.display = 'none';
            vicFallback.style.display = 'flex';
            vicFallback.className = `w-full h-full flex flex-col items-center justify-center ${currentTheme.color}`;
            vicEmoji.innerText = currentTheme.emoji;
        }

        function startGame() {
            if (selectedTables.length === 0) return;
            document.getElementById('setup-error').innerText = "";

            currentTheme = themes[Math.floor(Math.random() * themes.length)];

            // Reset Images
            gameImg.style.display = 'block';
            gameImg.src = currentTheme.url; 
            gameFallback.style.display = 'none';
            victoryImg.style.display = 'block';
            victoryImg.src = currentTheme.url;
            vicFallback.style.display = 'none';

            // Grid
            tilesRemaining = Array.from({length: 20}, (_, i) => i);
            puzzleGrid.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.innerText = i + 1;
                puzzleGrid.appendChild(tile);
            }
            updateUI();

            screens.setup.classList.add('hidden');
            screens.victory.classList.add('hidden');
            screens.game.classList.remove('hidden');
            screens.game.classList.add('flex');
            globalHomeBtn.classList.remove('hidden');

            nextTurn();
        }

        function updateUI() {
            const rem = tilesRemaining.length;
            document.getElementById('tiles-count').innerText = rem;
            document.getElementById('progress-bar').style.width = `${((20-rem)/20)*100}%`;
        }

        // --- Game Logic ---
        function nextTurn() {
            if (tilesRemaining.length === 0) {
                setTimeout(() => {
                    screens.game.classList.add('hidden');
                    screens.game.classList.remove('flex');
                    screens.victory.classList.remove('hidden');
                    screens.victory.classList.add('flex');
                }, 1500);
                return;
            }
            isProcessing = false;
            feedbackArea.innerText = '';
            document.getElementById('ai-bubble').classList.add('hidden');
            generateQuestion();
        }

        function generateQuestion() {
            // Pick a base from user selection
            const base = selectedTables[Math.floor(Math.random() * selectedTables.length)];
            
            // --- LOGIC FOR HARD MODE vs NORMAL ---
            
            // Calculate limit to stay under 100
            const maxAllowed = Math.floor(100 / base);
            let maxFactor = 10;
            if (difficulty === 'hard') maxFactor = 12;
            const actualMax = Math.min(maxFactor, maxAllowed);
            
            let other;

            if (difficulty === 'hard') {
                // HARD MODE CONSTRAINT: NO 1 and NO 10 allowed as factors
                // Also, prefer higher numbers if possible
                do {
                    other = Math.floor(Math.random() * actualMax) + 1;
                } while (other === 1 || other === 10);
            } else {
                // Normal mode: anything goes (1-10)
                other = Math.floor(Math.random() * actualMax) + 1;
            }

            const isMult = Math.random() > 0.5;
            let qStr, ans, op;
            let type = 'standard'; 

            // Hard mode: 75% chance of missing variable
            if (difficulty === 'hard' && Math.random() > 0.25) {
                type = 'missing';
            }

            if (isMult) {
                const product = base * other;
                
                if (type === 'missing') {
                    if (Math.random() > 0.5) {
                        qStr = `? × ${base} = ${product}`;
                        ans = other;
                    } else {
                        qStr = `${base} × ? = ${product}`;
                        ans = other;
                    }
                } else {
                    if (Math.random() > 0.5) qStr = `${base} × ${other} = ?`;
                    else qStr = `${other} × ${base} = ?`;
                    ans = product;
                }
                op = 'mult';

            } else {
                const dividend = base * other;
                
                if (type === 'missing') {
                    qStr = `? : ${base} = ${other}`;
                    ans = dividend;
                } else {
                    qStr = `${dividend} : ${base} = ?`;
                    ans = other;
                }
                op = 'div';
            }

            currentQ = { text: qStr, answer: ans, base, other, op };
            questionDisplay.innerText = qStr; 
            renderOptions(ans);
        }

        function renderOptions(correct) {
            optionsContainer.innerHTML = '';
            let opts = new Set([correct]);
            while (opts.size < 3) {
                let off = Math.floor(Math.random()*5)+1;
                if(Math.random()>0.5) off*=-1;
                let w = correct+off;
                if(w<=0) w = correct + Math.abs(off) + 1; 
                if(w!==correct) opts.add(w);
            }
            Array.from(opts).sort(()=>Math.random()-0.5).forEach(o => {
                const b = document.createElement('button');
                b.innerText = o;
                b.className = "bg-white border-b-4 border-blue-200 text-blue-600 text-2xl font-bold py-3 rounded-xl active:border-b-0 active:translate-y-1 shadow-sm";
                b.onclick = () => check(o, b);
                optionsContainer.appendChild(b);
            });
        }

        function check(val, btn) {
            if(isProcessing) return;
            if (val === currentQ.answer) {
                isProcessing = true;
                btn.className = "bg-green-500 text-white border-b-4 border-green-700 text-2xl font-bold py-3 rounded-xl shadow-lg scale-105";
                feedbackArea.innerHTML = '<span class="text-green-500">נכון!</span>';
                
                const rIdx = Math.floor(Math.random()*tilesRemaining.length);
                const tId = tilesRemaining[rIdx];
                tilesRemaining.splice(rIdx, 1);
                document.getElementById(`tile-${tId}`).classList.add('revealed');
                updateUI();
                
                setTimeout(nextTurn, tilesRemaining.length===0 ? 1000 : 800);
            } else {
                btn.className += " bg-red-100 border-red-300 text-red-500 shake";
                setTimeout(() => btn.className = "bg-white border-b-4 border-blue-200 text-blue-600 text-2xl font-bold py-3 rounded-xl", 500);
                feedbackArea.innerHTML = '<span class="text-red-400">לא נכון...</span>';
            }
        }

        // --- AI ---
        function hideAi() { document.getElementById('ai-bubble').classList.add('hidden'); }
        async function askStrategy() {
            if(isProcessing) return;
            const el = document.getElementById('ai-bubble');
            const txt = document.getElementById('ai-text');
            el.classList.remove('hidden');
            txt.innerText = "טוען רמז...";
            
            setTimeout(() => {
                if (currentQ.text.includes('?')) {
                     txt.innerText = "יש כאן נעלם! נסה להפוך את התרגיל. (כפל הופך לחילוק ולהפך)";
                } else if (currentQ.op === 'div') {
                    txt.innerText = `נסה לספור בדילוגים של ${currentQ.base} עד שתגיע ל-${currentQ.answer * currentQ.base}.`;
                } else {
                    txt.innerText = `חיבור חוזר: ${currentQ.base} ועוד ${currentQ.base}... ככה ${currentQ.other} פעמים.`;
                }
            }, 500);
        }
    </script>
</body>
</html>
